{% extends "base.html" %}

{% block body %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h2 class="text-center mb-4">Register</h2>

            <form method="POST">
                {% csrf_token %}
                
                {{ form.non_field_errors }}

                {% for field in form %}
                    <div class="mb-3">
                        {{ field.label_tag }}
                        {{ field }}
                        <div class="text-danger">
                            {{ field.errors }}
                        </div>
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-primary w-100">
                    Register
                </button>

            </form>

        </div>
    </div>
</div>
{% endblock %}
